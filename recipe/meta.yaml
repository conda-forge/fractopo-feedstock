{% set name = "fractopo" %}
{% set version = "0.9.1" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/fractopo-{{ version }}.tar.gz
  sha256: b2d7b048c745340ae516f6a0151a50ea6bed25fb213544d096cc5f44ae12f501

build:
  number: 0
  noarch: python
  entry_points:
    - fractopo = fractopo.__main__:APP
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
    - poetry-core >=2.0,<3
  run:
    - click
    - geopandas >=1.0.0
    - matplotlib-base >=3.5.3
    - numpy >=1.26.0,<2.0.0
    - pandas >=1.3,<3.0.0
    - powerlaw >=1.4.6,<2.0.0
    - python >={{ python_min }},<3.15
    - python-ternary
    - rich >=11.0.0
    - scikit-learn
    - scipy >=1.9.1
    - seaborn
    - shapely >=2.0.0,<3.0.0
    - typer >=0.4.0
    - joblib >=1.2.0
    - beartype >=0.19.0

test:
  imports:
    - fractopo
    - fractopo.analysis
  commands:
    - pip check
    - fractopo --help
    - fractopo network --help
    - fractopo tracevalidate --help
    - FRACTOPO_DISABLE_CACHE=1 pytest -v --doctest-modules .
  requires:
    - pip
    - python {{ python_min }}
    - pytest
  source_files:
    - fractopo
    - pyproject.toml


about:
  home: https://github.com/nialov/fractopo
  summary: Fracture Network Analysis
  license: MIT
  license_family: MIT
  license_file: LICENSE.md
  doc_url: https://fractopo.readthedocs.io/en/latest/
  dev_url: https://github.com/nialov/fractopo

extra:
  recipe-maintainers:
    - nialov
